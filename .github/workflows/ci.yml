name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (Rust + TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd web && npm ci

      - name: Type check TS
        run: cd web && npx tsc --noEmit

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run unit tests
        run: cargo test --all

      - name: Run WASM tests (Node)
        run: wasm-pack test --node

  build-wasm:
    name: Build & E2E
    runs-on: ubuntu-latest
    needs: [lint, test-rust]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --release --target web --out-dir web/pkg

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Optimize WASM with wasm-opt
        run: wasm-opt --enable-simd --enable-bulk-memory -Oz -o web/pkg/ascii_canvas_bg.wasm web/pkg/ascii_canvas_bg.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd web && npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run E2E tests
        run: |
          cd web
          nohup npm run dev > /tmp/vite.log 2>&1 &
          echo "Waiting for dev server..."
          for i in {1..60}; do
            if curl -s http://localhost:3003 > /dev/null 2>&1; then
              echo "Dev server is ready"
              break
            fi
            sleep 1
          done
          cd ..
          npx playwright test --project=chromium --timeout=90000
        env:
          CI: true
