name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path filters keep quality left: only run expensive jobs for relevant changes.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      product: ${{ steps.filter.outputs.product }}
      harness: ${{ steps.filter.outputs.harness }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'benches/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - 'deny.toml'
            web:
              - 'web/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
            harness:
              - 'scripts/**'
              - 'AGENTS.md'
              - 'agents-docs/**'
              - '.agents/**'
              - '.loc-allowlist'
              - '.github/workflows/**'
            product:
              - 'src/**'
              - 'tests/**'
              - 'benches/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - 'deny.toml'
              - 'web/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'scripts/**'
              - 'mise.toml'

  fmt:
    name: Format
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  architecture:
    name: Architecture Fitness
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Layer import rules + LOC
        run: |
          bash scripts/check-architecture.sh
          # LOC: fail only on non-allowlisted oversized files
          max=500
          failed=0
          while IFS= read -r file; do
            lines=$(wc -l < "$file" | tr -d ' ')
            rel="${file#./}"
            if [ "$lines" -gt "$max" ]; then
              if grep -qxF "$rel" .loc-allowlist 2>/dev/null; then
                echo "WARN: $rel has $lines lines (allowlisted)"
              else
                echo "FAIL: $rel has $lines lines (max $max)"
                failed=1
              fi
            fi
          done < <(find ./src -name '*.rs' -type f | sort)
          exit $failed

  rust:
    name: Rust (Build + Tests)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./->target

      - name: Build
        run: cargo build --all-targets

      - name: Run tests (Native)
        run: cargo test --all

      - name: Run tests (WASM)
        run: cargo test --all --target wasm32-unknown-unknown
        env:
          WASM_BINDGEN_TEST_ONLY_NODE: 1

  security:
    name: Security Audit
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Generate lockfile
        run: cargo generate-lockfile
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: Dependency Policy (cargo-deny)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  web:
    name: Web (Lint + Types + Unit)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: web
        run: pnpm run lint

      - name: TypeScript (strict)
        working-directory: web
        run: pnpm exec tsc --noEmit

      - name: Vitest
        working-directory: web
        run: pnpm test

  wasm:
    name: WASM Build
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.product == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./->target

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Build WASM
        run: |
          npm install -g wasm-opt
          pnpm run build:wasm

      - name: WASM size budget
        run: pnpm run check-size

      - name: Upload WASM
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: web/pkg

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [changes, wasm]
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.product == 'true' ||
       needs.changes.outputs.harness == 'true') &&
      needs.wasm.result == 'success'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Cache pnpm
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd web && pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Download WASM
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: web/pkg

      - name: Run E2E tests
        run: |
          cd web
          nohup pnpm run dev > /tmp/vite.log 2>&1 &
          echo "Waiting for dev server..."
          for i in {1..60}; do
            if curl -s http://localhost:3003 > /dev/null 2>&1; then
              echo "Dev server is ready"
              break
            fi
            sleep 1
          done
          cd ..
          npx playwright test --project=chromium --timeout=90000
        env:
          CI: true

  ci-success:
    name: CI Success
    needs: [fmt, clippy, architecture, rust, security, deny, web, wasm, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.architecture.result }}"
            "${{ needs.rust.result }}"
            "${{ needs.security.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.web.result }}"
            "${{ needs.wasm.result }}"
            "${{ needs.e2e.result }}"
          )
          for res in "${results[@]}"; do
            if [[ "$res" == "failure" ]]; then
              echo "One or more critical CI jobs failed"
              exit 1
            fi
          done
          echo "All CI jobs passed, were skipped, or were cancelled (concurrency)!"
