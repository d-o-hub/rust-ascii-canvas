name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  guard-rails:
    name: Guard Rails
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_dry_run: ${{ inputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-workflow"

      - name: Run tests
        run: cargo test --lib --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Determine version
        id: version
        run: |
          if [ ! -f "VERSION" ]; then
            echo "Error: VERSION file not found"
            exit 1
          fi
          
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: VERSION file must contain a valid semantic version (x.y.z)"
            exit 1
          fi
          
          echo "Found version: $VERSION"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}
          echo "Last tag version: $LAST_VERSION"

          if [ "$VERSION" = "$LAST_VERSION" ]; then
            echo "Error: Version $VERSION is already the latest tag"
            exit 1
          fi
          
          IFS='.' read -r V_MAJOR V_MINOR V_PATCH <<< "$VERSION"
          IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$LAST_VERSION"

          VALID=false
          if [ "$V_MAJOR" -gt "$L_MAJOR" ] && [ "$V_MINOR" -eq 0 ] && [ "$V_PATCH" -eq 0 ]; then
            VALID=true
            echo "Valid major increment"
          elif [ "$V_MAJOR" -eq "$L_MAJOR" ] && [ "$V_MINOR" -gt "$L_MINOR" ] && [ "$V_PATCH" -eq 0 ]; then
            VALID=true
            echo "Valid minor increment"
          elif [ "$V_MAJOR" -eq "$L_MAJOR" ] && [ "$V_MINOR" -eq "$L_MINOR" ] && [ "$V_PATCH" -gt "$L_PATCH" ]; then
            VALID=true
            echo "Valid patch increment"
          fi

          if [ "$VALID" != "true" ]; then
            echo "Error: Version $VERSION is not a valid increment over $LAST_VERSION"
            echo "Must be a valid major, minor, or patch increment."
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-wasm:
    name: Build WASM
    needs: guard-rails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-workflow"

      - name: Build WASM
        run: wasm-pack build --release --target web --out-dir web/pkg

      - name: Install binaryen
        run: |
          wget -q https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz
          tar xzf binaryen-version_123-x86_64-linux.tar.gz
          echo "$(pwd)/binaryen-version_123/bin" >> $GITHUB_PATH

      - name: Optimize WASM with wasm-opt
        run: wasm-opt --enable-simd --enable-bulk-memory --enable-sign-ext --enable-nontrapping-float-to-int -Oz -o web/pkg/ascii_canvas_bg.wasm web/pkg/ascii_canvas_bg.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: web/pkg
          retention-days: 1

  create-release:
    name: Create Release
    needs: [guard-rails, build-wasm]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.guard-rails.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: web/pkg

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Changelog
        id: changelog
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          TAG_NAME="v$VERSION"
          DATE=$(date +'%Y-%m-%d')
          
          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" 2>/dev/null | grep -v "^$" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" | grep -v "^$" || true)
          fi
          
          if [ -z "$CHANGES" ]; then
            CHANGES="- No notable changes"
          fi

          # Create temporary file for new changelog entry
          cat > new_changelog_entry.md << EOT
          ## [$VERSION] - $DATE

          ### Changes
          $CHANGES

          EOT

          # Prepend to existing CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            # We want to insert the new entry right after the first header (# Changelog or similar)
            # Find the line number of the first ## [ version ] header
            FIRST_VERSION_LINE=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1 || echo "")

            if [ -n "$FIRST_VERSION_LINE" ]; then
              head -n $((FIRST_VERSION_LINE-1)) CHANGELOG.md > temp_changelog.md
              cat new_changelog_entry.md >> temp_changelog.md
              tail -n +$FIRST_VERSION_LINE CHANGELOG.md >> temp_changelog.md
              mv temp_changelog.md CHANGELOG.md
            else
              # No version headers found, just prepend
              cat new_changelog_entry.md CHANGELOG.md > temp_changelog.md
              mv temp_changelog.md CHANGELOG.md
            fi
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat new_changelog_entry.md >> CHANGELOG.md
          fi

          # We still need the release_body.md for the GitHub Release
          cat > release_body.md << EOT
          ## v$VERSION
          
          ### Changes
          $CHANGES
          
          ### Quick Start
          \`\`\`bash
          wasm-pack build --release --target web --out-dir web/pkg
          cd web && npm run start:dev
          \`\`\`
          
          See CHANGELOG.md for full details.
          EOT
          
          # Replace 'npm run start:dev' with 'npm run dev'
          sed -i 's/start:dev/dev/g' release_body.md

          rm new_changelog_entry.md

      - name: Commit and Push Changes
        if: needs.guard-rails.outputs.is_dry_run != 'true'
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          git add CHANGELOG.md VERSION
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump version to $VERSION and update changelog"
            git push origin HEAD
          fi

      - name: Bump versions and update files
        id: bump
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.1.1")
          PREV_VERSION=${PREV_TAG#v}

          # Setup git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update Cargo.toml
          sed -i "s/version = \"$PREV_VERSION\"/version = \"$VERSION\"/" Cargo.toml

          # Update package.json (root)
          sed -i "s/\"version\": \"$PREV_VERSION\"/\"version\": \"$VERSION\"/" package.json

          # Update web/package.json
          sed -i "s/\"version\": \"$PREV_VERSION\"/\"version\": \"$VERSION\"/" web/package.json

          # Update package-lock.json files
          npm --no-git-tag-version version $VERSION || true
          cd web && npm --no-git-tag-version version $VERSION || true && cd ..

          # Update other md files (e.g. plans/PROJECT_STATUS.md)
          find . -name "*.md" -not -path "*/node_modules/*" -not -name "CHANGELOG.md" -exec sed -i "s/$PREV_VERSION/$VERSION/g" {} +

          # Prepend to CHANGELOG.md
          TODAY=$(date +%Y-%m-%d)
          CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" 2>/dev/null | grep -v "^$" || git log --pretty=format:"- %s (%h)" -n 20 | grep -v "^$")

          # Create temporary file with new changelog entry
          cat > new_changelog_entry.md << TEMP_EOF
          ## [$VERSION] - $TODAY

          ### Changes
          $CHANGES

          TEMP_EOF

          # Combine changelog
          awk -v entry="$(cat new_changelog_entry.md)" \
              '/^## \[/ { if (!inserted) { print entry; print ""; inserted=1 } } { print }' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          rm new_changelog_entry.md

          # Commit and push changes
          git add Cargo.toml package.json package-lock.json web/package.json web/package-lock.json CHANGELOG.md || true
          # Add md files
          git add $(find . -name "*.md" -not -path "*/node_modules/*") || true
          git diff --quiet && git diff --staged --quiet || git commit -a -m "chore: bump version to $VERSION"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git push origin HEAD || true

          # Save new tag target to output
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: needs.guard-rails.outputs.is_dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          # gh release create creates the tag and the release in one step
          # Target is HEAD so it uses the commit we just pushed
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release_body.md \
            --target HEAD
  publish-wasm:
    name: Publish WASM
    needs: create-release
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run != 'true'
    steps:
      - name: Summary
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Release v$VERSION created successfully!"
          echo "Tag v$VERSION pushed by gh release create."

  dry-run:
    name: Dry Run
    needs: guard-rails
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run == 'true'
    steps:
      - name: Summary
        run: |
          echo "## Dry Run Summary"
          echo "Version: ${{ needs.guard-rails.outputs.version }}"
          echo ""
          echo "All guard-rails passed! Ready for release."
