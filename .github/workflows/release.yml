name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0 or patch/minor/major)'
        required: false
        default: 'patch'
        type: string
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  guard-rails:
    name: Guard Rails
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_dry_run: ${{ inputs.dry_run == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-workflow"

      - name: Run tests
        run: cargo test --lib --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          IS_DRY_RUN="${{ inputs.dry_run }}"
          
          if [ "$IS_DRY_RUN" == "true" ]; then
            echo "Dry run mode - using 0.0.0-dryrun"
            echo "version=0.0.0-dryrun" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Exact version provided
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            # Auto-increment
            case "$INPUT_VERSION" in
              patch)
                TAG_TYPE="patch"
                ;;
              minor)
                TAG_TYPE="minor"
                ;;
              major)
                TAG_TYPE="major"
                ;;
              *)
                TAG_TYPE="patch"
                ;;
            esac
            
            # Get latest tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LAST_VERSION=${LAST_TAG#v}
            
            # Parse version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            
            case "$TAG_TYPE" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi
          
          echo "Selected version: ${{ steps.version.outputs.version }}"

  build-wasm:
    name: Build WASM
    needs: guard-rails
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-workflow"

      - name: Build WASM
        run: wasm-pack build --release --target web --out-dir web/pkg

      - name: Install binaryen
        run: |
          wget -q https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz
          tar xzf binaryen-version_123-x86_64-linux.tar.gz
          echo "$(pwd)/binaryen-version_123/bin" >> $GITHUB_PATH

      - name: Optimize WASM with wasm-opt
        run: wasm-opt --enable-simd --enable-bulk-memory --enable-sign-ext --enable-nontrapping-float-to-int -Oz -o web/pkg/ascii_canvas_bg.wasm web/pkg/ascii_canvas_bg.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: web/pkg
          retention-days: 1

  create-release:
    name: Create Release
    needs: [guard-rails, build-wasm]
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run != 'true'
    outputs:
      version: ${{ needs.guard-rails.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: web/pkg

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" 2>/dev/null | grep -v "^$" | head -20)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -n 20 | grep -v "^$")
          fi
          
          cat > release_body.md << EOF
          ## v$VERSION
          
          ### Changes
          $CHANGES
          
          ### Quick Start
          \`\`\`bash
          wasm-pack build --release --target web --out-dir web/pkg
          cd web && npm run dev
          \`\`\`
          
          See CHANGELOG.md for full details.
          EOF
          
          cat release_body.md

      - name: Bump versions and update files
        id: bump
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.1.1")
          PREV_VERSION=${PREV_TAG#v}

          # Setup git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update Cargo.toml
          sed -i "s/version = \"$PREV_VERSION\"/version = \"$VERSION\"/" Cargo.toml

          # Update package.json (root)
          sed -i "s/\"version\": \"$PREV_VERSION\"/\"version\": \"$VERSION\"/" package.json

          # Update web/package.json
          sed -i "s/\"version\": \"$PREV_VERSION\"/\"version\": \"$VERSION\"/" web/package.json

          # Update package-lock.json files
          npm --no-git-tag-version version $VERSION || true
          cd web && npm --no-git-tag-version version $VERSION || true && cd ..

          # Update other md files (e.g. plans/PROJECT_STATUS.md)
          find . -name "*.md" -not -path "*/node_modules/*" -not -name "CHANGELOG.md" -exec sed -i "s/$PREV_VERSION/$VERSION/g" {} +

          # Prepend to CHANGELOG.md
          TODAY=$(date +%Y-%m-%d)
          CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" 2>/dev/null | grep -v "^$" || git log --pretty=format:"- %s (%h)" -n 20 | grep -v "^$")

          # Create temporary file with new changelog entry
          cat > new_changelog_entry.md << TEMP_EOF
          ## [$VERSION] - $TODAY

          ### Changes
          $CHANGES

          TEMP_EOF

          # Combine changelog
          awk -v entry="$(cat new_changelog_entry.md)" \
              '/^## \[/ { if (!inserted) { print entry; print ""; inserted=1 } } { print }' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          rm new_changelog_entry.md

          # Commit and push changes
          git add Cargo.toml package.json package-lock.json web/package.json web/package-lock.json CHANGELOG.md || true
          # Add md files
          git add $(find . -name "*.md" -not -path "*/node_modules/*") || true
          git diff --quiet && git diff --staged --quiet || git commit -a -m "chore: bump version to $VERSION"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git push origin HEAD || true

          # Save new tag target to output
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.guard-rails.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          # gh release create creates the tag and the release in one step
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release_body.md \
            --target "${{ steps.bump.outputs.commit_sha || github.sha }}"

  publish-wasm:
    name: Publish WASM
    needs: create-release
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run != 'true'
    steps:
      - name: Summary
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Release v$VERSION created successfully!"
          echo "Tag v$VERSION pushed by gh release create."

  dry-run:
    name: Dry Run
    needs: guard-rails
    runs-on: ubuntu-latest
    if: needs.guard-rails.outputs.is_dry_run == 'true'
    steps:
      - name: Summary
        run: |
          echo "## Dry Run Summary"
          echo "Version: ${{ needs.guard-rails.outputs.version }}"
          echo ""
          echo "All guard-rails passed! Ready for release."
